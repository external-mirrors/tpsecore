[package]
name = "tpsecore"
version = "0.1.0"
edition = "2021"
authors = ["UniQMG"]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
wasm-bindgen = { version = "0.2.63", features = ["serde-serialize"] }
console_error_panic_hook = { version = "0.1.6", optional = true }
#wee_alloc = { version = "0.4.5", optional = true }
base64 = "0.13.0"
lazy_static = "1.4.0"
regex = "1.6.0"
serde = "1.0.122"
serde_json = "1.0.45"
serde_with = "1.14.0"
data-url = "0.1.1"
thiserror = "1.0.31"
image = "0.24.3"
console_log = "0.2.0"
log = "0.4.17"
simple_logger = "2.2.0"
num-traits = "0.2.15"
resvg = "0.23.0"
usvg = "0.23.0"
tiny-skia = "0.6"
web-sys = { version = "0.3.4", features = ["XmlHttpRequest", "XmlHttpRequestResponseType"]}
mime_guess = "2.0.4"
mime = "0.3.16"
sha2 = "0.10.2"
hex = "0.4.3"
ogg = "0.9.0"
symphonia = { version = "0.5.1", features = ["mp3", "isomp4", "aac"] }
hound = "3.4.0"
zip = "0.6.2"

[dev-dependencies]
wasm-bindgen-test = "0.3.13"

[profile.test]
opt-level = 0 # Turn up to 3 to get ~30x speedups in tests

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "s"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false # it's s l o w
