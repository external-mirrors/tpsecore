[package]
name = "tpsecore"
version = "0.1.1"
edition = "2021"
authors = ["UniQMG"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Wasm stuff
wasm-bindgen = { version = "0.2.95", features = ["serde-serialize"] }
console_error_panic_hook = { version = "0.1.6" }
#wee_alloc = { version = "0.4.5", optional = true }
console_log = "0.2.0"
js-sys = "0.3.59"

# Data utilities
base64 = "0.13.0"
regex = "1.6.0"
serde = "1.0.122"
serde_json = "1.0.45"
serde_with = "1.14.0"
data-url = "0.1.1"
num-traits = "0.2.15"
mime_guess = "2.0.4"
mime = "0.3.16"
sha2 = "0.10.2"
hex = "0.4.3"
zip = { version = "0.6.2", default-features = false, features = ["deflate"] } # bzip + zstd busted for wasm?
itertools = "0.10.3"

# Other utilities
lazy_static = "1.4.0"
thiserror = "1.0.31"
log = "0.4.17"
simple_logger = "2.2.0"

# Image
image = "0.24.3"
resvg = "0.23.0"
usvg = "0.23.0"
tiny-skia = "0.6"
imageproc = "0.23.0"
rusttype = "0.9.2"

# Audio
symphonia = { version = "0.5.1", features = ["mp3", "isomp4", "aac"] } # various decoders
hound = "3.4.0" # wav encoder

[dev-dependencies]
wasm-bindgen-test = "0.3.13"

[profile.test]
opt-level = 1 # Turn up to 3 to get ~30x speedups in tests

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "s"
# opt-level = 3

[package.metadata.wasm-pack.profile.release]
wasm-opt = false # it's s l o w
